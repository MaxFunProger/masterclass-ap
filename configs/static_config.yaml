components_manager:
  task_processors:
    main-task-processor:
      thread_name: main-worker
      worker_threads: 4
    fs-task-processor:
      thread_name: fs-worker
      worker_threads: 2
  default_task_processor: main-task-processor

  components:
    server:
      listener:
        port: 80
        address: 0.0.0.0
        task_processor: main-task-processor
      listener-monitor:
        port: 8081
        address: 0.0.0.0
        task_processor: main-task-processor
      set-response-server-hostname: false

    logging:
      fs-task-processor: fs-task-processor
      loggers:
        default:
          file_path: '@stderr'
          level: warning
          flush_level: warning

    dns-client:
      fs-task-processor: fs-task-processor

    http-client-middleware-pipeline:
      middlewares:
        http-client-middleware-disabled:
          enabled: false
        http-client-middleware-override:
          enabled: false

    http-client:
      core-component: http-client-core
      middlewares:
        http-client-middleware-override:
          enabled: false
    http-client-core:
      fs-task-processor: fs-task-processor

    statistics-storage: {}
    testsuite-support: {}

    default-secdist-provider:
      config: configs/secdist.json
    secdist:
      provider: default-secdist-provider

    dynamic-config:
      fs-task-processor: fs-task-processor
      fs-cache-path: build/dynamic_config_cache.json
      defaults:
        USERVER_LOG_REQUEST: false

    app-db:
      dbalias: app-db
      blocking_task_processor: fs-task-processor

    handler-ping:
      path: /ping
      task_processor: main-task-processor
      method: GET

    handler-mclist:
      path: /mclist
      task_processor: main-task-processor
      method: GET

    handler-mcadd:
      path: /mcadd
      task_processor: main-task-processor
      method: POST

    handler-mcdelete:
      path: /mcdelete
      task_processor: main-task-processor
      method: DELETE

    handler-auth-register:
      path: /register
      task_processor: main-task-processor
      method: POST

    handler-auth-login:
      path: /login
      task_processor: main-task-processor
      method: POST

    handler-userdelete:
      path: /userdelete
      task_processor: main-task-processor
      method: DELETE

    handler-user-profile:
      path: /user/profile
      task_processor: main-task-processor
      method: GET

    handler-user-favorites:
      path: /user/favorites
      task_processor: main-task-processor
      method: GET,POST,DELETE

    handler-static-images:
      path: /static/images/*
      task_processor: main-task-processor
      method: GET

    fs-cache-component:
      dir: static
      fs-task-processor: fs-task-processor
      update-period: 10s

    handler-static:
      path: /static/*
      method: GET
      task_processor: main-task-processor
      fs-cache-component: fs-cache-component
