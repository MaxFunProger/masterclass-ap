# Пароль БД задаётся при первом создании тома. Если видите password authentication failed —
# либо выровняйте POSTGRES_PASSWORD с тем, что был при initdb, либо: docker compose down -v
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - app-data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    # userver резолвит хост из DSN через свой DNS-клиент; без этого на части хостов бывает
    # «Could not contact DNS servers» и падает пул к postgres (ошибка выглядит как проблема с БД).
    dns:
      - 127.0.0.11
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Картинки из scripts/download_images.py без пересборки образа
      - ./static:/app/static
    ports:
      # По умолчанию 80:80. Если «address already in use» — MASTERCLASSES_HTTP_PORT=8080 в .env
      - "${MASTERCLASSES_HTTP_PORT:-80}:80"
      - "${MASTERCLASSES_MONITOR_PORT:-18081}:8081"
    restart: unless-stopped

  agent-sidecar:
    build:
      context: ./agent_sidecar
      dockerfile: Dockerfile
    depends_on:
      - backend
    environment:
      # Внутри сети compose HTTP API — сервис backend, порт контейнера 80
      BACKEND_URL: http://backend:80
      SIDECAR_PORT: "5000"
    env_file:
      - path: agent_sidecar/.env
        required: false
    ports:
      - "${AGENT_HTTP_PORT:-5000}:5000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  app-data:
