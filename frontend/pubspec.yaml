name: masterclasses_app
description: Афиша мастер-классов (мобильное приложение).
publish_to: 'none'
# Версия для пользователя + versionCode для Play
version: 1.0.1+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.3.0
  provider: ^6.0.5
  go_router: ^12.0.0
  shared_preferences: ^2.2.0
  url_launcher: ^6.3.0
  flutter_svg: ^2.0.10
  appmetrica_plugin: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
    - assets/background_orange.png
    - assets/welcome_logo.svg
    - assets/button_big_black.svg
    - assets/button_big_orange.svg
    - assets/button_small_black.svg
    - assets/date.svg
    - assets/gradient_black.svg
    - assets/price_orange.svg
    - assets/like_background.svg
    - assets/button_big_white.svg
    - assets/button_big_orange_gradient.svg
    - assets/icon_exit.svg
    - assets/icon_send.svg
    - assets/avatar_dummy.svg
    - assets/avatar_chat.svg
    - assets/guy_love.svg
    - assets/guy_hello.svg
    - assets/guy_sing.svg
    - assets/guy_look.svg
    - assets/guy_home.svg
    - assets/guy_sleep.svg

